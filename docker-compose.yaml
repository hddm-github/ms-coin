services:

  # ==================== MySQL ====================
  mysql:
    container_name: mscoin-mysql
    image: docker.m.daocloud.io/library/mysql:8.0.20
    restart: always

    ports:
      - "3309:3306"

    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zero_mall

    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --explicit_defaults_for_timestamp=true
      --lower_case_table_names=1

    volumes:
      - /data/mscoin/mysql/data:/var/lib/mysql
      - /data/mscoin/mysql/logs:/logs

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

    logging:
      options:
        max-size: "100m"
        max-file: "3"

    networks:
      - mscoin-net



  # ==================== Redis ====================
  redis:
    container_name: mscoin-redis
    image: docker.m.daocloud.io/library/redis:6.2.7
    restart: always

    ports:
      - "6379:6379"

    command: redis-server --requirepass root123456 --appendonly yes

    volumes:
      - /data/mscoin/redis/data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "root123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

    logging:
      options:
        max-size: "50m"
        max-file: "3"

    networks:
      - mscoin-net



